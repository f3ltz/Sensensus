```svg
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="256" height="256" fill="#050b18"/>

  <!-- Connection lines -->
  <g stroke="#1fa4ff" stroke-width="2" opacity="0.6">
    <line x1="128" y1="128" x2="60" y2="80"/>
    <line x1="128" y1="128" x2="200" y2="80"/>
    <line x1="128" y1="128" x2="60" y2="180"/>
    <line x1="128" y1="128" x2="200" y2="180"/>
    <line x1="60" y1="80" x2="200" y2="80"/>
    <line x1="60" y1="180" x2="200" y2="180"/>
  </g>

  <!-- Center swarm node -->
  <circle cx="128" cy="128" r="16" fill="#ffb000" stroke="#ffb000" stroke-width="2"/>

  <!-- Swarm nodes -->
  <circle cx="60" cy="80" r="8" fill="#00ff9c"/>
  <circle cx="200" cy="80" r="8" fill="#00ff9c"/>
  <circle cx="60" cy="180" r="8" fill="#00ff9c"/>
  <circle cx="200" cy="180" r="8" fill="#00ff9c"/>

  <!-- Outer swarm ring -->
  <circle cx="128" cy="128" r="70"
          fill="none"
          stroke="#1fa4ff"
          stroke-width="1.5"
          stroke-dasharray="6 6"
          opacity="0.5"/>

</svg>
```
