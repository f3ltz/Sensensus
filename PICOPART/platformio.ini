; SwarmVerifier Transporter — Raspberry Pi Pico 2W (RP2350)
[env:pico2w]
platform  = https://github.com/maxgerhardt/platform-raspberrypi.git
board     = rpipico2w
framework = arduino

lib_deps =
    adafruit/Adafruit BNO08x @ ^1.2.3
    adafruit/Adafruit BusIO @ ^1.14.0
    https://github.com/kmackay/micro-ecc.git
    bblanchon/ArduinoJson @ ^7.0.0
    ;https://github.com/tensorflow/tflite-micro-arduino-examples.git
    ; TFLite Micro: copy into lib/tflite-micro/ manually

build_flags =
    -DWIFI_SSID=\"Udaya\"
    -DWIFI_PASS=\"Prasad#5\"
    -DMULTICAST_IP=\"239.0.0.1\"
    -DMULTICAST_PORT=5005
    -DBID_PORT=5006
    -DHTTP_PORT=8080
    -DSAMPLE_RATE_HZ=50
    -DWINDOW_SIZE_SAMPLES=50
    -DCSV_BUFFER_SAMPLES=75
    -DINPUT_TENSOR_SIZE=350
    -DTENSOR_ARENA_SIZE=65536
    -DANOMALY_CONFIDENCE_THRESHOLD=0.85f
    -DBID_WINDOW_MS=5000
    -DDELIVERY_TIMEOUT_MS=60000
    -DQUORUM_SIZE=3
    -DQUORUM_W_PRICE=0.5f
    -DQUORUM_W_REP=0.3f
    -DQUORUM_W_STAKE=0.2f
    -DFLOW_ENABLED=1
    -DFLOW_API_URL=\"https://rest-testnet.onflow.org\"
    -DFLOW_CONTRACT_ADDR=\"0xfcd23c8d1553708a\"
    -DFLOW_ACCOUNT_ADDR=\"0x509c4a9717bc31f2\"
    -DPICO_PRIV_KEY_HEX=\"01f39cd07ddc766ab51ef62fbad5943d2b1321e27c63ff5fa19b00badd4e3b5b\"
    -DSTORACHA_UPLOAD_URL=\"https://up.web3.storage\"
    -DSTORACHA_AGENT_TOKEN=\"your_w3up_token\"
    -DPICO_STACK_SIZE=0x4000
    -DPICO_HEAP_SIZE=0x40000
    -DTF_LITE_STATIC_MEMORY
    -DINITIAL_TRANSPORTER_STAKE=100.0f

lib_ldf_mode = deep+
lib_archive = no
lib_extra_dirs = lib
build_src_filter = +<*> +<../lib/>