; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:pico2w]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2w
framework = arduino
board_build.core = earlephilhower
lib_deps = 
	adafruit/Adafruit BusIO @ ^1.16.1
	Wire
	adafruit/Adafruit BNO08x@^1.2.5
	https://github.com/kmackay/micro-ecc
	bblanchon/ArduinoJson @ ^7.0.0

monitor_speed = 115200


build_flags =
    -DWIFI_SSID=\"YOUR_SSID\"
    -DWIFI_PASS=\"YOUR_PASSWORD\"
    -DMULTICAST_IP=\"239.0.0.1\"
    -DMULTICAST_PORT=5005
    -DHTTP_PORT=8080
    -DANOMALY_CONFIDENCE_THRESHOLD=0.85f
    -DSAMPLE_RATE_HZ=50
    -DWINDOW_SIZE_SAMPLES=50
    ; RP2350 has 520KB RAM (vs 264KB on RP2040) — give TFLite a larger arena.
    ; Cortex-M33 with hardware FPU also means float32 inference is much faster.
    -DPICO_STACK_SIZE=0x4000
    -DPICO_HEAP_SIZE=0x20000